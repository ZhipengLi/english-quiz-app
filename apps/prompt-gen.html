<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerPoint Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-2xl shadow-xl shadow-slate-200/60 p-8 border border-slate-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 text-blue-600 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Prompt Generator</h1>
            <p class="text-slate-500 mt-2 text-sm">Pick a country and choose your prompt style</p>
        </div>

        <div class="space-y-4">
            <!-- Prompt 1 -->
            <div class="relative group">
                <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block ml-1">Option 1: Standard Report</label>
                <div class="min-h-[80px] w-full bg-slate-50 border border-slate-200 rounded-xl p-4 flex items-center justify-start transition-all duration-200 group-hover:border-blue-200 group-hover:bg-blue-50/30">
                    <p id="prompt1-text" class="text-sm font-medium text-slate-400 italic">
                        Click generate to see the first option...
                    </p>
                </div>
                <button 
                    id="copyBtn1" 
                    onclick="copyToClipboard('prompt1-text', 'copyBtn1')" 
                    class="absolute top-7 right-2 p-2 bg-white text-slate-400 hover:text-blue-600 rounded-lg shadow-sm border border-slate-100 opacity-0 group-hover:opacity-100 transition-all duration-200 hidden"
                    title="Copy to clipboard"
                >
                    <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <svg class="check-icon hidden text-green-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>

            <!-- Prompt 2 -->
            <div class="relative group">
                <label class="text-[10px] uppercase tracking-wider font-bold text-slate-400 mb-1 block ml-1">Option 2: 2-Slide PPTX</label>
                <div class="min-h-[80px] w-full bg-slate-50 border border-slate-200 rounded-xl p-4 flex items-center justify-start transition-all duration-200 group-hover:border-blue-200 group-hover:bg-blue-50/30">
                    <p id="prompt2-text" class="text-sm font-medium text-slate-400 italic">
                        Click generate to see the second option...
                    </p>
                </div>
                <button 
                    id="copyBtn2" 
                    onclick="copyToClipboard('prompt2-text', 'copyBtn2')" 
                    class="absolute top-7 right-2 p-2 bg-white text-slate-400 hover:text-blue-600 rounded-lg shadow-sm border border-slate-100 opacity-0 group-hover:opacity-100 transition-all duration-200 hidden"
                    title="Copy to clipboard"
                >
                    <svg class="copy-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    <svg class="check-icon hidden text-green-500" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                </button>
            </div>
        </div>

        <div class="mt-8">
            <button 
                onclick="generatePrompts()" 
                class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-all duration-200 shadow-lg shadow-blue-200 active:scale-[0.98]"
            >
                Generate Both Prompts
            </button>
        </div>

        <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full text-sm font-medium shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50">
            Copied to clipboard!
        </div>
    </div>

    <script>
        const countries = [
            "Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan", 
            "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso", "Burundi", 
            "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic", "Chad", "Chile", "China", "Colombia", "Comoros", "Congo", "Costa Rica", "Croatia", "Cuba", "Cyprus", "Czech Republic", 
            "Denmark", "Djibouti", "Dominica", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia", 
            "Fiji", "Finland", "France", "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau", "Guyana", 
            "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel", "Italy", "Ivory Coast", 
            "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg", 
            "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania", "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar", 
            "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger", "Nigeria", "North Korea", "North Macedonia", "Norway", 
            "Oman", "Pakistan", "Palau", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland", "Portugal", 
            "Qatar", "Romania", "Russia", "Rwanda", "Saint Kitts and Nevis", "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Sao Tome and Principe", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands", "Somalia", "South Africa", "South Korea", "South Sudan", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria", 
            "Taiwan", "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Tuvalu", 
            "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam", 
            "Yemen", "Zambia", "Zimbabwe"
        ];

        function generatePrompts() {
            const country = countries[Math.floor(Math.random() * countries.length)];
            
            const p1 = `Can you create a PowerPoint report about ${country}?`;
            const p2 = `Create a 2 slides pptx about ${country}, don't do any additional search, just generate the slides content based on your knowledge.`;
            
            updateElement('prompt1-text', 'copyBtn1', p1);
            updateElement('prompt2-text', 'copyBtn2', p2);
        }

        function updateElement(textId, btnId, content) {
            const textEl = document.getElementById(textId);
            const btnEl = document.getElementById(btnId);
            
            textEl.style.opacity = '0';
            
            setTimeout(() => {
                textEl.innerText = content;
                textEl.classList.remove('italic', 'text-slate-400');
                textEl.classList.add('text-slate-700');
                textEl.style.opacity = '1';
                btnEl.classList.remove('hidden');
            }, 100);
        }

        function copyToClipboard(textId, btnId) {
            const text = document.getElementById(textId).innerText;
            if (!text || text.includes('Click generate')) return;

            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast();
                showSuccessState(btnId);
            } catch (err) {
                console.error('Copy failed', err);
            }
            
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, 2000);
        }

        function showSuccessState(btnId) {
            const btn = document.getElementById(btnId);
            const copyIcon = btn.querySelector('.copy-icon');
            const checkIcon = btn.querySelector('.check-icon');
            
            copyIcon.classList.add('hidden');
            checkIcon.classList.remove('hidden');
            btn.classList.add('text-green-600', 'border-green-100');
            
            setTimeout(() => {
                copyIcon.classList.remove('hidden');
                checkIcon.classList.add('hidden');
                btn.classList.remove('text-green-600', 'border-green-100');
            }, 2000);
        }
    </script>
</body>
</html>
