<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Quiz App</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        :root {
            --primary-color: #3498db; --secondary-color: #2c3e50; --background-color: #ecf0f1;
            --card-bg-color: #ffffff; --correct-color: #27ae60; --incorrect-color: #e74c3c;
            --font-color: #34495e; --border-radius: 12px; --box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--background-color); color: var(--font-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background-color: var(--card-bg-color); border-radius: var(--border-radius); box-shadow: var(--box-shadow); width: 100%; max-width: 700px; overflow: hidden; }
        .view { padding: 30px 40px; display: none; }
        .view.active { display: block; }
        #json-input { width: 100%; height: 150px; border: 2px solid #bdc3c7; border-radius: 8px; padding: 10px; font-family: monospace; font-size: 0.85rem; margin-bottom: 20px; resize: vertical; }
        .order-options { display: flex; gap: 20px; margin-bottom: 25px; align-items: center; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 20px; }
        #progress-bar-container { flex-grow: 1; height: 10px; background-color: #e0e0e0; border-radius: 5px; }
        #progress-bar { height: 100%; width: 0%; background-color: var(--primary-color); border-radius: 5px; transition: width 0.3s ease-in-out; }
        .question-wrapper { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 25px; }
        #question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.5; flex-grow: 1; }
        .action-btns { display: flex; gap: 5px; flex-shrink: 0; }
        .speak-btn, .explain-btn { background: none; border: none; cursor: pointer; color: var(--primary-color); padding: 8px; border-radius: 50%; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; }
        .speak-btn:hover, .explain-btn:hover { background-color: rgba(52, 152, 219, 0.1); transform: scale(1.1); }
        .speak-btn.speaking { color: var(--correct-color); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(39, 174, 96, 0); } 100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); } }
        #options-container { display: grid; gap: 15px; }
        .option-btn { background-color: var(--card-bg-color); border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; cursor: pointer; width: 100%; text-align: left; font-family: inherit; }
        .option-btn.correct { background-color: var(--correct-color); color: white; }
        .option-btn.incorrect { background-color: var(--incorrect-color); color: white; }
        #blank-input { flex-grow: 1; padding: 15px; border: 2px solid #bdc3c7; border-radius: 8px; font-family: inherit; }
        #feedback-container { margin-top: 25px; padding: 15px; border-radius: 8px; background-color: #f8f9fa; border-left: 5px solid var(--primary-color); display: none; }
        .btn { background-color: var(--primary-color); color: white; border: none; padding: 15px 30px; font-weight: 600; border-radius: 8px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.visible { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 800px; position: relative; }
    </style>
</head>
<body>
    <div class="container">
        <div id="setup-view" class="view active">
            <h1>Quiz Setup</h1>
            <textarea id="json-input" placeholder="Paste JSON here..."></textarea>
            <div class="order-options">
                <label><input type="radio" name="order" value="sequence" checked> Sequential</label>
                <label><input type="radio" name="order" value="random"> Random</label>
            </div>
            <div style="margin-bottom: 20px;">
                <label><input type="checkbox" id="reverse-check"> Two-way learning</label><br>
                <label style="margin-left:20px"><input type="checkbox" id="conditional-reverse-check" disabled> Only if incorrect</label>
            </div>
            <button id="start-btn" class="btn">Start Quiz</button>
            <p id="error-message"></p>
        </div>

        <div id="quiz-view" class="view">
            <div class="quiz-header">
                <div id="progress-bar-container"><div id="progress-bar"></div></div>
                <button id="show-text-btn" class="btn">Show Text</button>
            </div>
            <div class="question-wrapper">
                <div id="question-text"></div>
                <div class="action-btns">
                    <button id="speak-btn" class="speak-btn" title="Speak Word">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                    <button id="explain-btn" class="explain-btn" title="Explain with Gemini">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                    </button>
                </div>
            </div>
            <div id="options-container"></div>
            <div id="feedback-container">
                <p id="feedback-result"></p>
                <span id="feedback-explanation"></span>
            </div>
            <div class="controls"><button id="next-btn" class="btn">Next</button></div>
        </div>

        <div id="summary-view" class="view">
            <h2 id="summary-title">Complete!</h2>
            <div id="score-container"></div>
            <button id="restart-btn" class="btn">New Quiz</button>
        </div>
    </div>

    <div id="text-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="document.getElementById('text-modal').classList.remove('visible')">&times;</button>
            <pre id="reference-text-content"></pre>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let quizData = [], questionOrder = [], currentQuestionIndex = 0, score = 0;
            let isReverseEnabled = false, isConditionalReverse = false, isReversedStep = false;
            let part1Correct = false, part2Correct = false, incorrectlyAnsweredQuestions = [];

            const speakBtn = document.getElementById('speak-btn');
            const explainBtn = document.getElementById('explain-btn');
            const questionTextElement = document.getElementById('question-text');

            // --- 核心逻辑：始终抓取原始 Question 字段 ---
            const getOriginalWord = () => {
                const idx = questionOrder[currentQuestionIndex];
                const q = quizData[idx];
                if (!q) return "";
                // 关键：直接访问 JSON 中的原始 question 属性，并剔除下划线
                return q.question.replace(/_+/g, '').trim();
            };

            const handleSpeak = () => {
                window.speechSynthesis.cancel();
                const text = getOriginalWord();
                if (!text) return;
                const ut = new SpeechSynthesisUtterance(text);
                ut.lang = 'en-US';
                speakBtn.classList.add('speaking');
                ut.onend = () => speakBtn.classList.remove('speaking');
                window.speechSynthesis.speak(ut);
            };

            const handleExplain = () => {
                const word = getOriginalWord();
                if (word) {
                    window.open(`https://gemini.google.com/app?prompt=如何理解记忆这个词?${encodeURIComponent(word)}`, '_blank');
                }
            };

            // --- 界面交互逻辑 ---
            const reverseCheck = document.getElementById('reverse-check');
            const conditionalCheck = document.getElementById('conditional-reverse-check');
            reverseCheck.onchange = () => { 
                conditionalCheck.disabled = !reverseCheck.checked; 
                if (!reverseCheck.checked) conditionalCheck.checked = false; 
            };

            const startQuiz = () => {
                try {
                    const data = JSON.parse(document.getElementById('json-input').value || "{}");
                    quizData = data.quiz || [];
                    if (!quizData.length) throw "Empty quiz";
                    isReverseEnabled = reverseCheck.checked;
                    isConditionalReverse = conditionalCheck.checked;
                    questionOrder = [...Array(quizData.length).keys()];
                    if (document.querySelector('input[name="order"]:checked').value === 'random') {
                        questionOrder.sort(() => Math.random() - 0.5);
                    }
                    currentQuestionIndex = 0; score = 0; incorrectlyAnsweredQuestions = [];
                    document.getElementById('setup-view').classList.remove('active');
                    document.getElementById('quiz-view').classList.add('active');
                    displayQuestion();
                } catch(e) { alert("Invalid JSON or Empty Quiz Data"); }
            };

            const displayQuestion = () => {
                window.speechSynthesis.cancel();
                speakBtn.classList.remove('speaking');
                const idx = questionOrder[currentQuestionIndex];
                const q = quizData[idx];
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                document.getElementById('feedback-container').style.display = 'none';
                document.getElementById('next-btn').style.display = 'none';

                // 界面显示逻辑：如果是反向步骤，显示下划线
                if (isReversedStep) {
                    const cleanQ = q.question.replace(/_+/g, '').trim();
                    questionTextElement.textContent = q.question.trim().startsWith('_') ? 
                        `${q.answer} ${'_'.repeat(cleanQ.length)}` : `${'_'.repeat(cleanQ.length)} ${q.answer}`;
                } else {
                    questionTextElement.textContent = q.question;
                }

                if (q.type === 'blank') {
                    const input = document.createElement('input'); input.id = 'blank-input';
                    const btn = document.createElement('button'); btn.className = 'btn'; btn.textContent = 'Submit';
                    btn.onclick = () => {
                        const isCorrect = input.value.trim().toLowerCase() === (isReversedStep ? q.question.replace(/_+/g, '').trim() : q.answer).toLowerCase();
                        input.disabled = true; btn.disabled = true;
                        if (isReverseEnabled) { if (!isReversedStep) part1Correct = isCorrect; else part2Correct = isCorrect; }
                        else if (isCorrect) score++; else incorrectlyAnsweredQuestions.push(idx);
                        document.getElementById('feedback-result').textContent = isCorrect ? "Correct! 🎉" : "Incorrect!";
                        document.getElementById('feedback-container').style.display = 'block';
                        const next = document.getElementById('next-btn');
                        next.style.display = 'block';
                        next.textContent = (isReverseEnabled && !isReversedStep && !(isConditionalReverse && part1Correct)) ? "Next Part (Reverse)" : "Next";
                    };
                    container.appendChild(input); container.appendChild(btn);
                    setTimeout(() => input.focus(), 100);
                } else {
                    q.options.forEach(opt => {
                        const b = document.createElement('button'); b.className = 'option-btn'; b.textContent = opt;
                        b.onclick = () => {
                            const isCorrect = opt === q.answer;
                            if (isCorrect) score++; else incorrectlyAnsweredQuestions.push(idx);
                            Array.from(container.children).forEach(c => c.disabled = true);
                            b.classList.add(isCorrect ? 'correct' : 'incorrect');
                            document.getElementById('feedback-container').style.display = 'block';
                            document.getElementById('next-btn').style.display = 'block';
                        };
                        container.appendChild(b);
                    });
                }
                document.getElementById('progress-bar').style.width = `${((currentQuestionIndex)/questionOrder.length)*100}%`;
            };

            document.getElementById('start-btn').onclick = startQuiz;
            document.getElementById('next-btn').onclick = () => {
                const q = quizData[questionOrder[currentQuestionIndex]];
                if (isReverseEnabled && q.type === 'blank' && !isReversedStep && !(isConditionalReverse && part1Correct)) {
                    isReversedStep = true; displayQuestion(); return;
                }
                if (isReverseEnabled && q.type === 'blank') {
                    if (isConditionalReverse && !part1Correct) incorrectlyAnsweredQuestions.push(questionOrder[currentQuestionIndex]);
                    else if (!isConditionalReverse && !(part1Correct && part2Correct)) incorrectlyAnsweredQuestions.push(questionOrder[currentQuestionIndex]);
                    else score++;
                }
                isReversedStep = false; currentQuestionIndex++;
                if (currentQuestionIndex < questionOrder.length) displayQuestion();
                else {
                    document.getElementById('quiz-view').classList.remove('active');
                    document.getElementById('summary-view').classList.add('active');
                    document.getElementById('score-container').textContent = `Score: ${score}/${questionOrder.length}`;
                }
            };
            document.getElementById('restart-btn').onclick = () => location.reload();
            document.getElementById('show-text-btn').onclick = () => {
                document.getElementById('reference-text-content').textContent = "Quiz Data loaded successfully.";
                document.getElementById('text-modal').classList.add('visible');
            };
            speakBtn.onclick = handleSpeak;
            explainBtn.onclick = handleExplain;
        });
    </script>
</body>
</html>
